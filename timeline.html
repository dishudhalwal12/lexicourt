<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Timeline | LexiCourt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <a href="dashboard.html" class="brand-wrap">
          <span class="brand-mark"></span>
          <span>
            <span class="brand-text">LexiCourt</span>
            <span class="brand-subtext">Matter timeline</span>
          </span>
        </a>
        <nav class="nav-cluster">
          <a class="nav-link-pill" href="dashboard.html"><i class="bi bi-grid"></i> Overview</a>
          <a class="nav-link-pill" href="cases.html"><i class="bi bi-briefcase"></i> Cases</a>
          <a class="nav-link-pill" href="case-detail.html"><i class="bi bi-folder2-open"></i> Documents</a>
          <a class="nav-link-pill" href="assistant.html"><i class="bi bi-stars"></i> AI Assistant</a>
          <a class="nav-link-pill" href="drafts.html"><i class="bi bi-file-earmark-richtext"></i> Drafts</a>
          <a class="nav-link-pill" href="#" onclick="lexiCourtUtils.comingSoon(event, 'Settings arrive in Phase 2.');"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="nav-actions">
          <button class="icon-button" type="button" data-coming-soon="Notifications arrive in Phase 2.">
            <i class="bi bi-bell"></i>
          </button>
          <a class="avatar-chip" href="client-dashboard.html">
            <span class="avatar-photo">JS</span>
            <span class="avatar-copy">
              <strong>Jaskirat</strong>
              <span>Lawyer</span>
            </span>
          </a>
        </div>
      </header>

      <section class="page-header">
        <div>
          <h1 class="page-title">Case Timeline</h1>
          <p class="page-subtitle">
            Review the complete hearing chronology and major milestones for the selected matter.
          </p>
        </div>
        <div style="min-width: 320px;">
          <label class="section-label" for="timelineCaseSelect">Case Selector</label>
          <select class="app-select" id="timelineCaseSelect"></select>
        </div>
      </section>

      <section class="timeline-wrap" id="timelineList"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const caseSelect = document.getElementById("timelineCaseSelect");
        caseSelect.innerHTML = window.lexiCourtData.cases
          .map(
            (item, index) =>
              `<option value="${item.caseId}" ${index === 0 ? "selected" : ""}>${item.caseId} • ${item.caseTitle}</option>`
          )
          .join("");

        window.lexiCourtUtils.renderTimeline("timelineList", window.lexiCourtData.caseTimeline);
      });
    </script>
  </body>
</html>
