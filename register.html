<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | LexiCourt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <script src="js/data.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <a href="index.html" class="brand-wrap">
          <span class="brand-mark"></span>
          <span>
            <span class="brand-text">LexiCourt</span>
            <span class="brand-subtext">Create your workspace</span>
          </span>
        </a>
        <nav class="nav-cluster">
          <a class="nav-link-pill" href="index.html">Home</a>
          <a class="nav-link-pill" href="login.html">Login</a>
          <a class="nav-link-pill active" href="register.html">Register</a>
        </nav>
        <div class="nav-actions"></div>
      </header>

      <section class="auth-shell">
        <div class="auth-card">
          <h1>Create account</h1>
          <p>Set up your LexiCourt profile for lawyer, client, or admin access.</p>
          <form class="form-grid" onsubmit="lexiCourtUtils.goToLogin(event)">
            <div>
              <label class="section-label" for="fullName">Full Name</label>
              <input class="app-input" id="fullName" type="text" placeholder="Jaskirat Singh Kamboh" required />
            </div>
            <div>
              <label class="section-label" for="registerEmail">Email Address</label>
              <input class="app-input" id="registerEmail" type="email" placeholder="name@lexicourt.in" required />
            </div>
            <div>
              <label class="section-label" for="registerPassword">Password</label>
              <input class="app-input" id="registerPassword" type="password" placeholder="Create password" required />
            </div>
            <div>
              <label class="section-label" for="confirmPassword">Confirm Password</label>
              <input class="app-input" id="confirmPassword" type="password" placeholder="Confirm password" required />
            </div>
            <div>
              <label class="section-label" for="role">Role</label>
              <select class="app-select" id="role" required>
                <option value="Lawyer">Lawyer</option>
                <option value="Client">Client</option>
                <option value="Admin">Admin</option>
              </select>
            </div>
            <button class="btn-accent w-100" type="submit">Register</button>
          </form>
          <p style="margin-top: 22px;">
            Already registered?
            <a class="text-link" href="login.html">Back to login</a>
          </p>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
