<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draft Generator | LexiCourt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <a href="dashboard.html" class="brand-wrap">
          <span class="brand-mark"></span>
          <span>
            <span class="brand-text">LexiCourt</span>
            <span class="brand-subtext">Lawyer workspace</span>
          </span>
        </a>
        <nav class="nav-cluster">
          <a class="nav-link-pill" href="dashboard.html"><i class="bi bi-grid"></i> Overview</a>
          <a class="nav-link-pill" href="cases.html"><i class="bi bi-briefcase"></i> Cases</a>
          <a class="nav-link-pill" href="case-detail.html"><i class="bi bi-folder2-open"></i> Documents</a>
          <a class="nav-link-pill" href="assistant.html"><i class="bi bi-stars"></i> AI Assistant</a>
          <a class="nav-link-pill active" href="drafts.html"><i class="bi bi-file-earmark-richtext"></i> Drafts</a>
          <a class="nav-link-pill" href="#" onclick="lexiCourtUtils.comingSoon(event, 'Settings arrive in Phase 2.');"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="nav-actions">
          <button class="icon-button" type="button" data-coming-soon="Notifications arrive in Phase 2.">
            <i class="bi bi-bell"></i>
          </button>
          <a class="avatar-chip" href="client-dashboard.html">
            <span class="avatar-photo">JS</span>
            <span class="avatar-copy">
              <strong>Jaskirat</strong>
              <span>Lawyer</span>
            </span>
          </a>
        </div>
      </header>

      <section class="page-header">
        <div>
          <h1 class="page-title">Draft Generator</h1>
          <p class="page-subtitle">
            Build first-pass affidavits, notices, and applications using structured case details and hearing facts.
          </p>
        </div>
      </section>

      <section class="two-col-grid">
        <aside class="chat-side-panel">
          <form id="draftForm" class="form-grid">
            <div>
              <label class="section-label" for="draftType">Draft Type</label>
              <select class="app-select" id="draftType">
                <option value="Affidavit">Affidavit</option>
                <option value="Notice">Notice</option>
                <option value="Application">Application</option>
              </select>
            </div>
            <div>
              <label class="section-label" for="draftCase">Case Selector</label>
              <select class="app-select" id="draftCase"></select>
            </div>
            <div>
              <label class="section-label" for="partyNames">Party Names</label>
              <input
                class="app-input"
                id="partyNames"
                type="text"
                value="Rohit Sharma v. State of Delhi"
                placeholder="Applicant and Respondent names"
              />
            </div>
            <div>
              <label class="section-label" for="facts">Facts</label>
              <textarea class="app-textarea" id="facts">Applicant seeks a concise hearing-ready draft based on the existing criminal appeal record, the bail application filed on 15 February 2025, and the court order dated 10 March 2025.</textarea>
            </div>
            <button class="btn-accent" type="submit">Generate Draft</button>
          </form>
        </aside>

        <section class="output-card">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="card-icon"><i class="bi bi-file-earmark-text"></i></span>
              <h2 id="draftOutputTitle" class="card-title">Generated Affidavit</h2>
            </div>
          </div>
          <div id="draftOutput" class="legal-output"></div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const draftForm = document.getElementById("draftForm");
        const draftType = document.getElementById("draftType");
        const draftCase = document.getElementById("draftCase");
        const output = document.getElementById("draftOutput");
        const title = document.getElementById("draftOutputTitle");

        draftCase.innerHTML = window.lexiCourtData.cases
          .map(
            (item, index) =>
              `<option value="${item.caseId}" ${index === 0 ? "selected" : ""}>${item.caseId} • ${item.caseTitle}</option>`
          )
          .join("");

        function refreshDraft() {
          const type = draftType.value;
          title.textContent = `Generated ${type}`;
          output.textContent = window.lexiCourtData.drafts[type];
        }

        draftForm.addEventListener("submit", (event) => {
          event.preventDefault();
          refreshDraft();
        });

        draftType.addEventListener("change", refreshDraft);
        refreshDraft();
      });
    </script>
  </body>
</html>
