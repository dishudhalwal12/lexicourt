<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | LexiCourt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <script src="js/data.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <a href="index.html" class="brand-wrap">
          <span class="brand-mark"></span>
          <span>
            <span class="brand-text">LexiCourt</span>
            <span class="brand-subtext">Secure practice login</span>
          </span>
        </a>
        <nav class="nav-cluster">
          <a class="nav-link-pill" href="index.html">Home</a>
          <a class="nav-link-pill active" href="login.html">Login</a>
          <a class="nav-link-pill" href="register.html">Register</a>
        </nav>
        <div class="nav-actions"></div>
      </header>

      <section class="auth-shell">
        <div class="auth-card">
          <h1>Welcome back</h1>
          <p>Access your LexiCourt workspace to review cases, documents, and upcoming hearings.</p>
          <form class="form-grid" onsubmit="lexiCourtUtils.goToDashboard(event)">
            <div>
              <label class="section-label" for="email">Email Address</label>
              <input class="app-input" id="email" type="email" placeholder="advocate@lexicourt.in" required />
            </div>
            <div>
              <label class="section-label" for="password">Password</label>
              <input class="app-input" id="password" type="password" placeholder="Enter password" required />
            </div>
            <button class="btn-accent w-100" type="submit">Login</button>
          </form>
          <p style="margin-top: 22px;">
            Don’t have an account?
            <a class="text-link" href="register.html">Register</a>
          </p>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
