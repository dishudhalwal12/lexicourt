<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cases | LexiCourt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <a href="dashboard.html" class="brand-wrap">
          <span class="brand-mark"></span>
          <span>
            <span class="brand-text">LexiCourt</span>
            <span class="brand-subtext">Lawyer workspace</span>
          </span>
        </a>
        <nav class="nav-cluster">
          <a class="nav-link-pill" href="dashboard.html"><i class="bi bi-grid"></i> Overview</a>
          <a class="nav-link-pill active" href="cases.html"><i class="bi bi-briefcase"></i> Cases</a>
          <a class="nav-link-pill" href="case-detail.html"><i class="bi bi-folder2-open"></i> Documents</a>
          <a class="nav-link-pill" href="assistant.html"><i class="bi bi-stars"></i> AI Assistant</a>
          <a class="nav-link-pill" href="drafts.html"><i class="bi bi-file-earmark-richtext"></i> Drafts</a>
          <a class="nav-link-pill" href="#" onclick="lexiCourtUtils.comingSoon(event, 'Settings arrive in Phase 2.');"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="nav-actions">
          <button class="icon-button" type="button" data-coming-soon="Notifications arrive in Phase 2.">
            <i class="bi bi-bell"></i>
          </button>
          <a class="avatar-chip" href="client-dashboard.html">
            <span class="avatar-photo">JS</span>
            <span class="avatar-copy">
              <strong>Jaskirat</strong>
              <span>Lawyer</span>
            </span>
          </a>
        </div>
      </header>

      <section class="page-header">
        <div>
          <h1 class="page-title">Cases</h1>
          <p class="page-subtitle">
            Monitor filed matters, hearing schedules, and case movement across courts.
          </p>
        </div>
      </section>

      <section class="panel-card table-card">
        <div class="table-toolbar mb-4">
          <div style="flex: 1; min-width: 240px;">
            <input id="caseSearch" class="search-input" type="search" placeholder="Search by case, client, or court" />
          </div>
          <button class="btn-accent" type="button" data-coming-soon="Case creation arrives in Phase 2.">New Case</button>
        </div>

        <div class="filter-row mb-4">
          <button class="filter-pill active" type="button" data-filter="All">All</button>
          <button class="filter-pill" type="button" data-filter="Active">Active</button>
          <button class="filter-pill" type="button" data-filter="Pending">Pending</button>
          <button class="filter-pill" type="button" data-filter="Closed">Closed</button>
          <button class="filter-pill" type="button" data-filter="Won">Won</button>
        </div>

        <div class="table-responsive">
          <table class="app-table">
            <thead>
              <tr>
                <th>Case ID</th>
                <th>Client Name</th>
                <th>Case Type</th>
                <th>Court</th>
                <th>Status</th>
                <th>Filed Date</th>
                <th>Next Hearing</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="casesTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.getElementById("caseSearch");
        const filters = document.querySelectorAll("[data-filter]");
        let activeFilter = "All";

        function renderRows() {
          const query = searchInput.value.trim().toLowerCase();
          const body = document.getElementById("casesTableBody");
          const rows = window.lexiCourtData.cases
            .filter((item) => {
              const matchesFilter = activeFilter === "All" || item.status === activeFilter;
              const haystack = [item.caseId, item.caseTitle, item.clientName, item.caseType, item.court]
                .join(" ")
                .toLowerCase();
              return matchesFilter && haystack.includes(query);
            })
            .map(
              (item) => `
                <tr class="clickable-row" data-href="case-detail.html">
                  <td><span class="table-case-title">${item.caseId}</span></td>
                  <td>
                    <div class="table-case-title">${item.clientName}</div>
                    <div class="metric-label">${item.caseTitle}</div>
                  </td>
                  <td>${item.caseType}</td>
                  <td>${item.court}</td>
                  <td>${window.lexiCourtUtils.statusBadge(item.status)}</td>
                  <td>${item.filedDate}</td>
                  <td>${item.nextHearing}</td>
                  <td>
                    <div class="action-group">
                      <button class="action-chip" type="button" onclick="event.stopPropagation(); window.location.href='case-detail.html';">
                        <i class="bi bi-eye"></i>
                      </button>
                      <button class="action-chip" type="button" onclick="event.stopPropagation(); lexiCourtUtils.comingSoon(event, 'Edit workflow arrives in Phase 2.');">
                        <i class="bi bi-pencil-square"></i>
                      </button>
                    </div>
                  </td>
                </tr>
              `
            )
            .join("");

          body.innerHTML = rows;
          body.querySelectorAll(".clickable-row").forEach((row) => {
            row.addEventListener("click", () => {
              window.location.href = row.dataset.href;
            });
          });
        }

        filters.forEach((button) => {
          button.addEventListener("click", () => {
            filters.forEach((item) => item.classList.remove("active"));
            button.classList.add("active");
            activeFilter = button.dataset.filter;
            renderRows();
          });
        });

        searchInput.addEventListener("input", renderRows);
        renderRows();
      });
    </script>
  </body>
</html>
