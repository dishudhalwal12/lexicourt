<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draft Generator | LexiCourt</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css?v=theme-fix" />
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script type="module" src="js/firebase-config.js?v=fallback-20260426"></script>
    <script type="module">
      import { protectPage } from "./js/auth-guard.js";
      import { initSharedUI } from "./js/page-init.js?v=theme-fix";
      import {
        getCasesForCurrentUser,
        getDocumentsByCase,
        getDraftsByCase,
        saveDraft,
        getCaseIdFromUrl,
        buildCaseUrl
      } from "./js/firestore-service.js?v=local-fallback-20260426";
      import { generateDraftFromApi } from "./js/api-client.js?v=local-fallback-20260426";
      import { downloadTextPdf } from "./js/pdf-export.js";

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setCaseLinks(caseId) {
        const links = {
          draftsDocumentsLink: "case-detail.html",
          draftsAssistantLink: "assistant.html"
        };

        Object.entries(links).forEach(([id, path]) => {
          const link = document.getElementById(id);
          if (link && caseId) {
            link.href = buildCaseUrl(path, caseId);
          }
        });
      }

      function toIsoDate(value) {
        if (!value) {
          return null;
        }
        if (typeof value.toDate === "function") {
          return value.toDate().toISOString();
        }
        const date = value instanceof Date ? value : new Date(value);
        return Number.isNaN(date.getTime()) ? null : date.toISOString();
      }

      function renderDraftOutput(type, content) {
        document.getElementById("draftOutputTitle").textContent = `Generated ${type}`;
        document.getElementById("draftOutput").textContent = content;
      }

      protectPage(["lawyer", "admin"], async (user, profile) => {
        document.body.style.display = 'block';
        initSharedUI();

        try {
          const cases = await getCasesForCurrentUser();
          const draftCase = document.getElementById("draftCase");
          const draftType = document.getElementById("draftType");
          const draftForm = document.getElementById("draftForm");
          const exportDraftBtn = document.getElementById("exportDraftPdfBtn");
          const requestedCaseId = getCaseIdFromUrl();
          const selectedCase = cases.find((item) => item.id === requestedCaseId) || cases[0];

          if (!selectedCase) {
            renderDraftOutput("Draft", "No case is assigned to this account yet.");
            return;
          }

          if (draftCase) {
            draftCase.innerHTML = cases
              .map(
                (item) =>
                  `<option value="${item.id}" ${item.id === selectedCase.id ? "selected" : ""}>${escapeHtml(item.caseNumber || item.id)} • ${escapeHtml(item.caseTitle)}</option>`
              )
              .join("");
          }

          setCaseLinks(selectedCase.id);
          const documents = await getDocumentsByCase(selectedCase.id);
          document.getElementById("partyNames").value = `${selectedCase.clientName || "Client"} v. ${selectedCase.oppositeParty || "Opposite Party"}`;
          document.getElementById("facts").value = selectedCase.notes || document.getElementById("facts").value;

          async function syncOutput() {
            const savedDrafts = await getDraftsByCase(selectedCase.id);
            const activeType = draftType.value;
            const matchingDraft = savedDrafts.find((item) => item.draftType === activeType);

            if (matchingDraft) {
              renderDraftOutput(activeType, matchingDraft.generatedText);
              return;
            }

            renderDraftOutput(activeType, "No saved draft yet. Generate one to store a Gemini-powered version for this matter.");
          }

          draftCase.addEventListener("change", () => {
            window.location.href = buildCaseUrl("drafts.html", draftCase.value);
          });

          draftType.addEventListener("change", () => {
            syncOutput().catch((error) => console.error(error));
          });

          draftForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const submitButton = draftForm.querySelector('button[type="submit"]');
            const type = draftType.value;
            const partyNames = document.getElementById("partyNames").value.trim();
            const facts = document.getElementById("facts").value.trim();

            submitButton.disabled = true;
            submitButton.textContent = "Generating draft...";

            try {
              const response = await generateDraftFromApi({
                caseData: {
                  id: selectedCase.id,
                  caseId: selectedCase.caseId || selectedCase.id,
                  caseNumber: selectedCase.caseNumber || selectedCase.caseId || selectedCase.id,
                  caseTitle: selectedCase.caseTitle,
                  matterType: selectedCase.matterType,
                  courtName: selectedCase.courtName,
                  status: selectedCase.status,
                  createdAt: toIsoDate(selectedCase.createdAt),
                  updatedAt: toIsoDate(selectedCase.updatedAt),
                  nextHearingDate: toIsoDate(selectedCase.nextHearingDate)
                },
                draftType: type,
                partyNames,
                facts,
                documents: documents.map((doc) => ({
                  id: doc.id,
                  fileName: doc.fileName,
                  displayTitle: doc.displayTitle,
                  documentType: doc.documentType,
                  extractedText: doc.extractedText || "",
                  rawTextContent: doc.rawTextContent || ""
                }))
              });

              const generatedText = response.draft;
              renderDraftOutput(type, generatedText);

              try {
                await saveDraft({
                  caseId: selectedCase.id,
                  draftType: type,
                  inputPayload: {
                    partyNames,
                    facts
                  },
                  generatedText,
                  status: "generated",
                  modelName: response.mode === "gemini" ? "gemini-2.5-flash" : "LexiCourt AI"
                });
              } catch (saveError) {
                console.error(saveError);
                window.lexiCourtUtils?.notify?.(
                  "Draft was generated, but it could not be saved to the case history.",
                  "warning"
                );
              }
            } catch (error) {
              console.error(error);
              window.lexiCourtUtils?.notify?.("Draft generation is unavailable right now. You can retry once the live API is ready.", "error");
            } finally {
              submitButton.disabled = false;
              submitButton.textContent = "Generate Draft";
            }
          });

          await syncOutput();

          exportDraftBtn?.addEventListener("click", () => {
            const body = document.getElementById("draftOutput")?.textContent?.trim();
            if (!body) {
              return;
            }

            downloadTextPdf({
              filename: `lexicourt-${String(draftType.value || "draft").toLowerCase()}-${new Date().toISOString().slice(0, 10)}.pdf`,
              title: `${draftType.value} Draft`,
              subtitle: `${selectedCase.caseTitle || "Matter"} • ${selectedCase.caseNumber || selectedCase.id}`,
              body
            });
          });
        } catch(e) { console.error(e); }
      });
    </script>
    <style>body { display: none; }</style>
  </head>
  <body class="workspace-page">
    <main class="page-shell">
      <header class="topbar">
        <a href="dashboard.html" class="brand-wrap">
          <span class="brand-mark"></span>
          <span>
            <span class="brand-text">LexiCourt</span>
            <span class="brand-subtext">Lawyer workspace</span>
          </span>
        </a>
        <nav class="nav-cluster">
          <a class="nav-link-pill" href="dashboard.html"><i class="bi bi-grid"></i> Overview</a>
          <a class="nav-link-pill" href="cases.html"><i class="bi bi-briefcase"></i> Cases</a>
          <a id="draftsDocumentsLink" class="nav-link-pill" href="case-detail.html"><i class="bi bi-folder2-open"></i> Documents</a>
          <a id="draftsAssistantLink" class="nav-link-pill" href="assistant.html"><i class="bi bi-stars"></i> AI Assistant</a>
          <a class="nav-link-pill active" href="drafts.html"><i class="bi bi-file-earmark-richtext"></i> Drafts</a>
          <a class="nav-link-pill" href="settings.html"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="nav-actions">
          <button class="icon-button" type="button" data-notification-trigger="true">
            <i class="bi bi-bell"></i>
          </button>
          <a class="avatar-chip" href="client-dashboard.html">
            <span class="avatar-photo">U</span>
            <span class="avatar-copy">
              <strong id="navUserName">User Name</strong>
              <span id="navUserRole">Role</span>
            </span>
          </a>
          <button id="logoutBtn" class="btn btn-outline-danger btn-sm p-1 ms-2" type="button" style="border:none;" title="Logout">
             <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>
      </header>

      <section class="page-header">
        <div>
          <h1 class="page-title">Draft Generator</h1>
          <p class="page-subtitle">
            Build first-pass affidavits, notices, and applications using structured case details and hearing facts.
          </p>
        </div>
      </section>

      <section class="two-col-grid">
        <aside class="chat-side-panel">
          <form id="draftForm" class="form-grid">
            <div>
              <label class="section-label" for="draftType">Draft Type</label>
              <select class="app-select" id="draftType">
                <option value="Affidavit">Affidavit</option>
                <option value="Notice">Notice</option>
                <option value="Application">Application</option>
              </select>
            </div>
            <div>
              <label class="section-label" for="draftCase">Case Selector</label>
              <select class="app-select" id="draftCase"></select>
            </div>
            <div>
              <label class="section-label" for="partyNames">Party Names</label>
              <input
                class="app-input"
                id="partyNames"
                type="text"
                value="Rohit Sharma v. State of Delhi"
                placeholder="Applicant and Respondent names"
              />
            </div>
            <div>
              <label class="section-label" for="facts">Facts</label>
              <textarea class="app-textarea" id="facts">Applicant seeks a concise hearing-ready draft based on the existing criminal appeal record, the bail application filed on 15 February 2025, and the court order dated 10 March 2025.</textarea>
            </div>
            <button class="btn-accent" type="submit">Generate Draft</button>
          </form>
        </aside>

        <section class="output-card">
          <div class="card-head">
            <div class="card-title-wrap">
              <span class="card-icon"><i class="bi bi-file-earmark-text"></i></span>
              <h2 id="draftOutputTitle" class="card-title">Generated Affidavit</h2>
            </div>
            <button id="exportDraftPdfBtn" class="btn-dark" type="button">Download PDF</button>
          </div>
          <div id="draftOutput" class="legal-output"></div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
  </body>
</html>
