<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant | LexiCourt</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module">
      import { protectPage } from "./js/auth-guard.js";
      import { initSharedUI } from "./js/page-init.js";
      import {
        getCasesForCurrentUser,
        getDocumentsByCase,
        getAiChatsByCase,
        saveAiChat,
        getCaseIdFromUrl,
        buildCaseUrl
      } from "./js/firestore-service.js";
      import { chatWithAssistant } from "./js/api-client.js";

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function toIsoDate(value) {
        if (!value) {
          return null;
        }
        if (typeof value.toDate === "function") {
          return value.toDate().toISOString();
        }
        const date = value instanceof Date ? value : new Date(value);
        return Number.isNaN(date.getTime()) ? null : date.toISOString();
      }

      function setCaseLinks(caseId) {
        const links = {
          assistantDocumentsLink: "case-detail.html",
          assistantDraftsLink: "drafts.html"
        };

        Object.entries(links).forEach(([id, path]) => {
          const link = document.getElementById(id);
          if (link && caseId) {
            link.href = buildCaseUrl(path, caseId);
          }
        });
      }

      function renderDocumentOptions(documents) {
        const select = document.getElementById("assistantDocumentSelect");
        if (!select) {
          return;
        }

        if (!documents.length) {
          select.innerHTML = `<option value="">No documents available</option>`;
          return;
        }

        select.innerHTML = [
          `<option value="">All case documents</option>`,
          ...documents.map(
            (doc) =>
              `<option value="${doc.id}">${escapeHtml(doc.displayTitle || doc.fileName || "Untitled document")}</option>`
          )
        ].join("");
      }

      function renderChatLog(messages, selectedCase, selectedDocument) {
        const log = document.getElementById("assistantChatLog");
        if (!log) {
          return;
        }

        if (!messages.length) {
          log.innerHTML = `
            <div class="chat-bubble ai">
              Ask about ${escapeHtml(selectedCase.caseTitle)}. ${selectedDocument ? `The selected document is ${escapeHtml(selectedDocument.displayTitle || selectedDocument.fileName)}.` : "You can query the full case file."}
            </div>
          `;
          return;
        }

        log.innerHTML = messages
          .flatMap(
            (item) => [
              `<div class="chat-bubble user">${escapeHtml(item.question)}</div>`,
              `<div class="chat-bubble ai">${escapeHtml(item.answer).replaceAll("\n", "<br />")}</div>`
            ]
          )
          .join("");

        log.scrollTop = log.scrollHeight;
      }

      function buildCasePayload(selectedCase, documents, currentChats) {
        return {
          caseData: {
            id: selectedCase.id,
            caseId: selectedCase.caseId || selectedCase.id,
            caseNumber: selectedCase.caseNumber || selectedCase.caseId || selectedCase.id,
            caseTitle: selectedCase.caseTitle,
            matterType: selectedCase.matterType,
            courtName: selectedCase.courtName,
            status: selectedCase.status,
            createdAt: toIsoDate(selectedCase.createdAt),
            updatedAt: toIsoDate(selectedCase.updatedAt),
            nextHearingDate: toIsoDate(selectedCase.nextHearingDate)
          },
          documents: documents.map((doc) => ({
            id: doc.id,
            fileName: doc.fileName,
            displayTitle: doc.displayTitle,
            documentType: doc.documentType,
            extractedText: doc.extractedText || "",
            rawTextContent: doc.rawTextContent || ""
          })),
          history: currentChats
        };
      }

      protectPage(["lawyer", "admin"], async (user, profile) => {
        document.body.style.display = 'block';
        initSharedUI();

        try {
          const cases = await getCasesForCurrentUser();
          const caseSelect = document.getElementById("assistantCaseSelect");
          const input = document.getElementById("assistantInput");
          const sendBtn = document.getElementById("assistantSendBtn");
          const requestedCaseId = getCaseIdFromUrl();
          const selectedCase = cases.find((item) => item.id === requestedCaseId) || cases[0];

          if (!selectedCase) {
            renderChatLog([], { caseTitle: "your matter" }, null);
            return;
          }

          if (caseSelect) {
            caseSelect.innerHTML = cases
              .map(
                (item) =>
                  `<option value="${item.id}" ${item.id === selectedCase.id ? "selected" : ""}>${escapeHtml(item.caseNumber || item.id)} • ${escapeHtml(item.caseTitle)}</option>`
              )
              .join("");
          }

          setCaseLinks(selectedCase.id);

          const documents = await getDocumentsByCase(selectedCase.id);
          renderDocumentOptions(documents);

          let currentChats = await getAiChatsByCase(selectedCase.id);
          renderChatLog(currentChats, selectedCase, null);

          if (caseSelect) {
            caseSelect.addEventListener("change", () => {
              window.location.href = buildCaseUrl("assistant.html", caseSelect.value);
            });
          }

          const documentSelect = document.getElementById("assistantDocumentSelect");
          if (documentSelect) {
            documentSelect.addEventListener("change", () => {
              const activeDocument = documents.find((doc) => doc.id === documentSelect.value) || null;
              renderChatLog(currentChats, selectedCase, activeDocument);
            });
          }

          document.querySelectorAll("[data-prompt]").forEach((button) => {
            button.addEventListener("click", () => {
              if (input) {
                input.value = button.dataset.prompt || "";
                input.focus();
              }
            });
          });

          if (sendBtn && input) {
            sendBtn.addEventListener("click", async () => {
              const question = input.value.trim();
              if (!question) {
                return;
              }

              const selectedDocument =
                documents.find((doc) => doc.id === documentSelect?.value) || null;

              sendBtn.disabled = true;
              sendBtn.innerHTML = `<i class="bi bi-hourglass-split"></i> Thinking`;

              try {
                const response = await chatWithAssistant({
                  ...buildCasePayload(selectedCase, documents, currentChats),
                  question,
                  selectedDocumentId: selectedDocument?.id || null
                });

                const answer = [
                  response.answer,
                  response.references?.length
                    ? `\n\nRelevant references:\n${response.references
                        .slice(0, 3)
                        .map((item) => `- ${item.source}: ${item.answer}`)
                        .join("\n")}`
                    : "",
                  response.recommendedActions?.length
                    ? `\n\nRecommended next actions:\n${response.recommendedActions
                        .slice(0, 3)
                        .map((item) => `- ${item}`)
                        .join("\n")}`
                    : ""
                ].join("");

                await saveAiChat({
                  caseId: selectedCase.id,
                  question,
                  answer,
                  sourceDocumentIds: selectedDocument ? [selectedDocument.id] : [],
                  responseType: "query",
                  modelName: response.mode === "gemini" ? "gemini-2.5-flash" : "LexiCourt Preview"
                });

                input.value = "";
                currentChats = await getAiChatsByCase(selectedCase.id);
                renderChatLog(currentChats, selectedCase, selectedDocument);
              } catch (error) {
                console.error(error);
                alert("Unable to generate the assistant reply right now. Please check the API server and try again.");
              } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<i class="bi bi-send-fill"></i> Send`;
              }
            });
          }

          if (input) {
            input.addEventListener("keydown", (event) => {
              if (event.key === "Enter") {
                event.preventDefault();
                sendBtn?.click();
              }
            });
          }
        } catch(e) { console.error(e); }
      });
    </script>
    <style>body { display: none; }</style>
  </head>
  <body class="workspace-page">
    <main class="page-shell">
      <header class="topbar">
        <a href="dashboard.html" class="brand-wrap">
          <span class="brand-mark"></span>
          <span>
            <span class="brand-text">LexiCourt</span>
            <span class="brand-subtext">Lawyer workspace</span>
          </span>
        </a>
        <nav class="nav-cluster">
          <a class="nav-link-pill" href="dashboard.html"><i class="bi bi-grid"></i> Overview</a>
          <a class="nav-link-pill" href="cases.html"><i class="bi bi-briefcase"></i> Cases</a>
          <a id="assistantDocumentsLink" class="nav-link-pill" href="case-detail.html"><i class="bi bi-folder2-open"></i> Documents</a>
          <a class="nav-link-pill active" href="assistant.html"><i class="bi bi-stars"></i> AI Assistant</a>
          <a id="assistantDraftsLink" class="nav-link-pill" href="drafts.html"><i class="bi bi-file-earmark-richtext"></i> Drafts</a>
          <a class="nav-link-pill" href="settings.html"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="nav-actions">
          <button class="icon-button" type="button" data-notification-trigger="true">
            <i class="bi bi-bell"></i>
          </button>
          <a class="avatar-chip" href="client-dashboard.html">
            <span class="avatar-photo">U</span>
            <span class="avatar-copy">
              <strong id="navUserName">User Name</strong>
              <span id="navUserRole">Role</span>
            </span>
          </a>
          <button id="logoutBtn" class="btn btn-outline-danger btn-sm p-1 ms-2" type="button" style="border:none;" title="Logout">
             <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>
      </header>

      <section class="page-header">
        <div>
          <h1 class="page-title">AI Legal Assistant</h1>
          <p class="page-subtitle">
            Query case folders, review recent orders, and surface hearing facts through a document-aware legal chat.
          </p>
        </div>
      </section>

      <section class="two-col-grid">
        <aside class="chat-side-panel stack-md">
          <div>
            <label class="section-label" for="assistantCaseSelect">Select Case</label>
            <select class="app-select" id="assistantCaseSelect"></select>
          </div>
          <div>
            <label class="section-label" for="assistantDocumentSelect">Select Document</label>
            <select class="app-select" id="assistantDocumentSelect"></select>
          </div>
          <div class="panel-card" style="padding: 18px;">
            <span class="section-label">Suggested prompts</span>
            <div class="stack-md">
              <button class="btn-dark w-100 justify-content-start" type="button" data-prompt="What was the last order passed?">
                What was the last order passed?
              </button>
              <button class="btn-dark w-100 justify-content-start" type="button" data-prompt="Summarize the prosecution response.">
                Summarize the prosecution response.
              </button>
              <button class="btn-dark w-100 justify-content-start" type="button" data-prompt="List key hearing dates from the file.">
                List key hearing dates from the file.
              </button>
            </div>
          </div>
        </aside>

        <section class="output-card">
          <div class="chat-window">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="card-icon"><i class="bi bi-chat-square-dots"></i></span>
                <h2 class="card-title">Document Chat</h2>
              </div>
            </div>
            <div id="assistantChatLog" class="chat-log"></div>
            <div class="chat-input-row">
              <input id="assistantInput" class="app-input" type="text" placeholder="Ask about the selected case file" />
              <button id="assistantSendBtn" class="btn-accent" type="button">
                <i class="bi bi-send-fill"></i>
                Send
              </button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
  </body>
</html>
