<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant | LexiCourt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <a href="dashboard.html" class="brand-wrap">
          <span class="brand-mark"></span>
          <span>
            <span class="brand-text">LexiCourt</span>
            <span class="brand-subtext">Lawyer workspace</span>
          </span>
        </a>
        <nav class="nav-cluster">
          <a class="nav-link-pill" href="dashboard.html"><i class="bi bi-grid"></i> Overview</a>
          <a class="nav-link-pill" href="cases.html"><i class="bi bi-briefcase"></i> Cases</a>
          <a class="nav-link-pill" href="case-detail.html"><i class="bi bi-folder2-open"></i> Documents</a>
          <a class="nav-link-pill active" href="assistant.html"><i class="bi bi-stars"></i> AI Assistant</a>
          <a class="nav-link-pill" href="drafts.html"><i class="bi bi-file-earmark-richtext"></i> Drafts</a>
          <a class="nav-link-pill" href="#" onclick="lexiCourtUtils.comingSoon(event, 'Settings arrive in Phase 2.');"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="nav-actions">
          <button class="icon-button" type="button" data-coming-soon="Notifications arrive in Phase 2.">
            <i class="bi bi-bell"></i>
          </button>
          <a class="avatar-chip" href="client-dashboard.html">
            <span class="avatar-photo">JS</span>
            <span class="avatar-copy">
              <strong>Jaskirat</strong>
              <span>Lawyer</span>
            </span>
          </a>
        </div>
      </header>

      <section class="page-header">
        <div>
          <h1 class="page-title">AI Legal Assistant</h1>
          <p class="page-subtitle">
            Query case folders, review recent orders, and surface hearing facts through a document-aware legal chat.
          </p>
        </div>
      </section>

      <section class="two-col-grid">
        <aside class="chat-side-panel stack-md">
          <div>
            <label class="section-label" for="assistantCaseSelect">Select Case</label>
            <select class="app-select" id="assistantCaseSelect"></select>
          </div>
          <div>
            <label class="section-label" for="assistantDocumentSelect">Select Document</label>
            <select class="app-select" id="assistantDocumentSelect"></select>
          </div>
          <div class="panel-card" style="padding: 18px;">
            <span class="section-label">Suggested prompts</span>
            <div class="stack-md">
              <button class="btn-dark w-100 justify-content-start" type="button" data-coming-soon="Contextual prompts arrive in Phase 2.">
                What was the last order passed?
              </button>
              <button class="btn-dark w-100 justify-content-start" type="button" data-coming-soon="Contextual prompts arrive in Phase 2.">
                Summarize the prosecution response.
              </button>
              <button class="btn-dark w-100 justify-content-start" type="button" data-coming-soon="Contextual prompts arrive in Phase 2.">
                List key hearing dates from the file.
              </button>
            </div>
          </div>
        </aside>

        <section class="output-card">
          <div class="chat-window">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="card-icon"><i class="bi bi-chat-square-dots"></i></span>
                <h2 class="card-title">Document Chat</h2>
              </div>
            </div>
            <div id="assistantChatLog" class="chat-log"></div>
            <div class="chat-input-row">
              <input class="app-input" type="text" placeholder="Ask about the selected case file" />
              <button class="btn-accent" type="button" data-coming-soon="Live AI replies arrive in Phase 2.">
                <i class="bi bi-send-fill"></i>
                Send
              </button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const caseSelect = document.getElementById("assistantCaseSelect");
        const documentSelect = document.getElementById("assistantDocumentSelect");

        caseSelect.innerHTML = window.lexiCourtData.cases
          .map(
            (item, index) =>
              `<option value="${item.caseId}" ${index === 0 ? "selected" : ""}>${item.caseId} • ${item.caseTitle}</option>`
          )
          .join("");

        documentSelect.innerHTML = window.lexiCourtData.caseDocuments
          .map((doc, index) => `<option value="${doc.fileName}" ${index === 0 ? "selected" : ""}>${doc.fileName}</option>`)
          .join("");

        window.lexiCourtUtils.renderAssistantMessages("assistantChatLog");
      });
    </script>
  </body>
</html>
